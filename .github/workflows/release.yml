name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      # --- Prepare runtime staging ---
      - name: Stage runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\staging\runtime | Out-Null
          Copy-Item index.js build\staging\runtime\
          Copy-Item tray.js build\staging\runtime\
          Copy-Item secure-env.js build\staging\runtime\
          Copy-Item package.json build\staging\runtime\
          if (Test-Path .env) { Copy-Item .env build\staging\runtime\ }
          Set-Location build\staging\runtime
          npm install --omit=dev --ignore-scripts --no-fund --no-audit

      - name: Bundle node.exe into staging
        shell: pwsh
        run: Copy-Item "$env:ProgramFiles\nodejs\node.exe" build\staging\runtime\node.exe

      - name: Stage logo
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path build\staging\logo | Out-Null
          Copy-Item logo\* build\staging\logo\

      # --- Build single all-in-one exe ---
      - name: Build claude-rpc.exe (PyInstaller all-in-one)
        shell: pwsh
        run: |
          pip install pyinstaller==6.14.1 pyinstaller-versionfile==2.1.1 -r requirements.txt --quiet
          create-version-file version_info.yaml --outfile version_info.txt
          pyinstaller --onefile --windowed `
            --icon=logo\anthropic-rpc.ico `
            --name=claude-rpc `
            --distpath=dist `
            --version-file=version_info.txt `
            --add-data="build\staging\runtime;runtime" `
            --add-data="build\staging\logo;logo" `
            main.py

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/claude-rpc.exe
          generate_release_notes: true
