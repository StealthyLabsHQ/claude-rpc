name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Install production deps for runtime
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\runtime | Out-Null
          Copy-Item index.js dist\runtime\
          Copy-Item tray.js dist\runtime\
          Copy-Item secure-env.js dist\runtime\
          Copy-Item package.json dist\runtime\
          if (Test-Path .env) { Copy-Item .env dist\runtime\ }
          Set-Location dist\runtime
          npm install --omit=dev --ignore-scripts --no-fund --no-audit

      - name: Bundle node.exe
        shell: pwsh
        run: Copy-Item "$env:ProgramFiles\nodejs\node.exe" dist\runtime\node.exe

      - name: Copy logo
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist\logo | Out-Null
          Copy-Item logo\* dist\logo\

      - name: Create archive
        run: Compress-Archive -Path dist\* -DestinationPath claude-rpc-windows-x64.zip
        shell: pwsh

      - name: Upload release
        uses: softprops/action-gh-release@v2
        with:
          files: claude-rpc-windows-x64.zip
          generate_release_notes: true
